    <style>
      body,
      html {
        margin: 0;
        padding: 0;
        width: 100%;
        height: 100%;
        overflow: hidden;
        background-color: #f8fafc;
      }

      #crm-frame {
        width: 100vw;
        /* Somamos 28px na altura total para compensar o que vamos puxar para cima */
        height: calc(100vh + 28px);
        border: none;
        display: block;
        /* TRUQUE DE MESTRE: Puxa o Iframe 28px para cima, escondendo o banner do Google */
        margin-top: 3px;
      }

      #loading {
        position: absolute;
        top: 50%;
        left: 50%;
        transform: translate(-50%, -50%);
        font-family: "Inter", sans-serif;
        color: #003399;
        font-weight: bold;
        z-index: -1;
      }
    </style>
  </head>
  <body>
    <div id="loading">Carregando o ambiente seguro...</div>

    <iframe
      id="crm-frame"
      src="https://script.google.com/macros/s/AKfycbwEkpOmQIYpZxjAvbz0P3L1-59EKzp6FIeAKgtTJ4cZ9_nKz3MLoZFaGPg31bkP9Mz6Qw/exec"

  </body>
